<app-navbar-component></app-navbar-component>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-title">
      <div class="page-title-line1">Eurovision</div>
      <div class="page-title-line2">2026</div>
    </h1>
  </div>

  @if (isLoading()) {
    <app-loading message="Chargement des chansons..." size="large"></app-loading>
  } @else {
    <div class="list-container">
      <div class="list">
        @for (song of songs(); track song.id) {
          <app-song-row [song]="song" [isVoted]="!!song.userVote" (songClick)="openModal($event)"></app-song-row>
        }
      </div>
    </div>
  }
</main>

<!-- Vote Modal -->
<app-vote-modal
  [isOpen]="isModalOpen"
  [song]="selectedSong"
  (closeModal)="closeModal()"
  (voteSubmitted)="onVoteSubmitted($event)"
></app-vote-modal>

<!-- Toast -->
<div [class.show]="isToastVisible" class="toast">
  <span class="toast-icon">✓</span>
  <span>{{ toastMessage }}</span>
</div>

<app-footer></app-footer>
