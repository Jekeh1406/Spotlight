<app-floating-particles></app-floating-particles>

<div class="register-container">
  <div class="logo">
    <h1>Creer un compte</h1>
    <p>Rejoignez Spotlight</p>
  </div>

  @if (errorMessage) {
    <div class="error-banner">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="register()" [formGroup]="registerForm">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">Prénom</label>
        <input formControlName="firstName" id="firstName" placeholder="Jean" type="text">
      </div>
      <div class="form-group">
        <label for="lastName">Nom</label>
        <input formControlName="lastName" id="lastName" placeholder="Dupont" type="text">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Adresse email</label>
      <input formControlName="email" id="email" placeholder="votre@email.com" type="email">
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="password-wrapper">
        <input formControlName="password" id="password" placeholder="8 caracteres minimum" [type]="showPassword ? 'text' : 'password'">
        <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
          @if (showPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          }
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmer le mot de passe</label>
      <div class="password-wrapper">
        <input formControlName="confirmPassword" id="confirmPassword" placeholder="••••••••" [type]="showConfirmPassword ? 'text' : 'password'">
        <button type="button" class="password-toggle" (click)="showConfirmPassword = !showConfirmPassword">
          @if (showConfirmPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          }
        </button>
      </div>
    </div>

    <app-password-rules
      (validChange)="onPasswordValidChange($event)"
      [confirmPassword]="registerForm.get('confirmPassword')?.value"
      [password]="registerForm.get('password')?.value"
      [showDifferentRule]="false">
    </app-password-rules>

    <button [disabled]="!registerForm.valid || !isPasswordValid" class="btn-primary" type="submit">S'inscrire</button>
  </form>

  <div class="footer-links">
    <span class="footer-text">Deja un compte ?</span>
    <a routerLink="/login">Se connecter</a>
  </div>
</div>
