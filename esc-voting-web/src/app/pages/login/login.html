<app-floating-particles></app-floating-particles>

<div class="login-container">
  <div class="logo">
    <h1>EscVoting</h1>
  </div>

  <form [formGroup]="loginFormGroup">
    @if (errorMessage()) {
      <div class="error-message">{{ errorMessage() }}</div>
    }

    <div class="form-group">
      <label for="email">Adresse email</label>
      <input formControlName="email" id="email" placeholder="votre@email.com" required type="email">
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="password-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="password" id="password"
               placeholder="••••••••"
               required>
        <button (click)="showPassword = !showPassword" class="password-toggle" type="button">
          @if (showPassword) {
            <svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                 stroke-width="2" viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" x2="23" y1="1" y2="23"/>
            </svg>
          } @else {
            <svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                 stroke-width="2" viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </div>

    <button (click)="login()" class="btn-primary" type="submit">Se connecter</button>
  </form>

  <div class="footer-links">
    <a href="#">Mot de passe oublie ?</a>
    <span>•</span>
    <a routerLink="/register">Creer un compte</a>
  </div>
</div>
