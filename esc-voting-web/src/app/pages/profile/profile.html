<app-navbar-component></app-navbar-component>

<div class="profile-page">
  <div class="profile-container">
    <div class="profile-header">
      <div class="avatar">
        {{ user()?.firstName?.charAt(0) || 'U' }}
      </div>
      <h1>Mon Profil</h1>
      <p>Gerez vos informations personnelles</p>
    </div>

    <div class="profile-sections">
      <!-- Section Informations personnelles -->
      <div class="profile-section">
        <h2>Informations personnelles</h2>

        <form (ngSubmit)="updateProfile()" [formGroup]="profileForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">Prénom</label>
              <input
                formControlName="firstName"
                id="firstName"
                placeholder="Votre prenom"
                type="text"
              />
            </div>
            <div class="form-group">
              <label for="lastName">Nom</label>
              <input
                formControlName="lastName"
                id="lastName"
                placeholder="Votre nom"
                type="text"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Adresse email</label>
            <input
              formControlName="email"
              id="email"
              placeholder="votre@email.com"
              type="email"
            />
          </div>

          <button [disabled]="isLoadingProfile() || !hasProfileChanges()" class="btn-primary" type="submit">
            @if (isLoadingProfile()) {
              <span class="spinner"></span>
              Enregistrement...
            } @else {
              Enregistrer les modifications
            }
          </button>
        </form>
      </div>

      <!-- Section Mot de passe -->
      <div class="profile-section">
        <h2>Changer le mot de passe</h2>

        <form (ngSubmit)="updatePassword()" [formGroup]="passwordForm">
          <div class="form-group">
            <label for="currentPassword">Mot de passe actuel</label>
            <div class="password-wrapper">
              <input
                formControlName="currentPassword"
                id="currentPassword"
                placeholder="Votre mot de passe actuel"
                [type]="showCurrentPassword ? 'text' : 'password'"
              />
              <button type="button" class="password-toggle" (click)="showCurrentPassword = !showCurrentPassword">
                @if (showCurrentPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="newPassword">Nouveau mot de passe</label>
            <div class="password-wrapper">
              <input
                formControlName="newPassword"
                id="newPassword"
                placeholder="Entrez votre nouveau mot de passe"
                [type]="showNewPassword ? 'text' : 'password'"
              />
              <button type="button" class="password-toggle" (click)="showNewPassword = !showNewPassword">
                @if (showNewPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmer le nouveau mot de passe</label>
            <div class="password-wrapper">
              <input
                formControlName="confirmPassword"
                id="confirmPassword"
                placeholder="Confirmez votre nouveau mot de passe"
                [type]="showConfirmPassword ? 'text' : 'password'"
              />
              <button type="button" class="password-toggle" (click)="showConfirmPassword = !showConfirmPassword">
                @if (showConfirmPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
          </div>

          <app-password-rules
            (validChange)="onPasswordValidChange($event)"
            [confirmPassword]="passwordForm.get('confirmPassword')?.value"
            [currentPassword]="passwordForm.get('currentPassword')?.value"
            [password]="passwordForm.get('newPassword')?.value"
            [showDifferentRule]="true">
          </app-password-rules>

          <button [disabled]="isLoadingPassword() || !isPasswordValid()" class="btn-secondary" type="submit">
            @if (isLoadingPassword()) {
              <span class="spinner"></span>
              Modification...
            } @else {
              Changer le mot de passe
            }
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Toast notification -->
@if (isToastVisible()) {
  <div [class.error]="toastType() === 'error'" [class.success]="toastType() === 'success'" class="toast">
    {{ toastMessage() }}
  </div>
}

<app-footer></app-footer>
