<div [class.active]="sessionExpiredService.isOpen()" class="modal">
  <div class="modal-content">
    <div class="modal-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    </div>
    <h2 class="modal-title">Session expiree</h2>
    <p class="modal-message">Votre session a expire. Veuillez vous reconnecter pour continuer.</p>
    <button (click)="onReconnect()" class="modal-btn">Se reconnecter</button>
  </div>
</div>
